<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Test Game Club</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #bb86fc;
    }

    .scores {
      display: flex;
      gap: 30px;
      justify-content: center;
      font-size: 18px;
    }

    .score-box {
      background: #1e1e1e;
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      border: 1px solid #333;
    }

    .score-value {
      font-weight: bold;
      color: #03dac6;
      font-size: 22px;
      display: block;
      margin-top: 4px;
    }

    .cards-container {
      display: flex;
      gap: 15px;
      perspective: 1000px;
    }

    .card {
      width: 90px;
      height: 140px;
      position: relative;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    /* Animación de entrada de las cartas */
    @keyframes slideIn {
      0% { transform: translateY(50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .card-enter {
      animation: slideIn 0.4s ease forwards;
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
      border: 2px solid transparent;
    }

    .card-front {
      background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
      border-color: #444;
      color: #888;
    }

    .card-front::after {
      content: '?';
    }

    .card-back {
      background: #eee;
      transform: rotateY(180deg);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card.flipped {
      pointer-events: none;
    }

    .card.good .card-back {
      color: #2e7d32;
      border-color: #4caf50;
      background: #e8f5e9;
    }

    .card.bad .card-back {
      color: #c62828;
      border-color: #ef5350;
      background: #ffebee;
    }

    .status-message {
      margin-top: 30px;
      height: 30px;
      font-size: 20px;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #bb86fc;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
    }

    .btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Test Game Club</h1>
    <div class="scores">
      <div class="score-box">
        Current <span class="score-value" id="current-score">0</span>
      </div>
      <div class="score-box">
        Best <span class="score-value" id="max-score" style="color:#bb86fc;">0</span>
      </div>
    </div>
  </div>

  <div class="cards-container" id="cards-container">
    <!-- Cards generated with JS -->
  </div>

  <div class="status-message" id="status-message">Select a card</div>
  
  <button class="btn" id="next-btn" onclick="nextRound()">Next Round</button>
  <button class="btn" id="restart-btn" onclick="startGame(true)" style="background-color: #cf6679;">Play Again</button>

  <script>
    let currentScore = 0;
    let maxScore = localStorage.getItem('minigame_max_score') || 0;
    let canPlay = false;

    const currentScoreEl = document.getElementById('current-score');
    const maxScoreEl = document.getElementById('max-score');
    const cardsContainer = document.getElementById('cards-container');
    const statusMessage = document.getElementById('status-message');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Init visual score
    maxScoreEl.textContent = maxScore;

    function startGame(resetScore = false) {
      if (resetScore) {
        currentScore = 0;
        updateScoreDisplay();
      }
      
      statusMessage.textContent = 'Select a card';
      statusMessage.style.color = '#fff';
      nextBtn.classList.remove('visible');
      restartBtn.classList.remove('visible');
      restartBtn.style.display = 'none';
      nextBtn.style.display = 'inline-block';
      
      cardsContainer.innerHTML = '';
      canPlay = true;

      // Create types array (2 good, 1 bad)
      const types = ['good', 'good', 'bad'];
      types.sort(() => Math.random() - 0.5);

      // Render cards
      types.forEach((type, index) => {
        const card = document.createElement('div');
        card.className = `card card-enter ${type}`;
        card.style.animationDelay = `${index * 0.1}s`;
        
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-front"></div>
            <div class="card-face card-back">${type === 'good' ? '💎' : '💣'}</div>
          </div>
        `;

        card.addEventListener('click', () => revealCard(card, type));
        cardsContainer.appendChild(card);
      });
    }

    function revealCard(card, type) {
      if (!canPlay || card.classList.contains('flipped')) return;
      canPlay = false; // block clicks
      
      card.classList.add('flipped');

      if (type === 'good') {
        currentScore++;
        updateScoreDisplay();
        statusMessage.textContent = 'Well done! +1 Point';
        statusMessage.style.color = '#4caf50';
        nextBtn.classList.add('visible');
      } else {
        statusMessage.textContent = 'Bomb! You lost.';
        statusMessage.style.color = '#ef5350';
        nextBtn.style.display = 'none';
        restartBtn.style.display = 'inline-block';
        setTimeout(() => restartBtn.classList.add('visible'), 500);
      }

      // Flip remaining cards for visual feedback
      setTimeout(() => {
        const allCards = document.querySelectorAll('.card');
        allCards.forEach(c => {
          if (!c.classList.contains('flipped')) {
            c.style.opacity = '0.5';
            c.classList.add('flipped');
          }
        });
      }, 800);
    }

    function nextRound() {
      const allCards = document.querySelectorAll('.card');
      allCards.forEach(c => {
        c.style.transform = 'translateY(50px)';
        c.style.opacity = '0';
      });
      setTimeout(() => startGame(false), 300);
    }

    function updateScoreDisplay() {
      currentScoreEl.textContent = currentScore;
      if (currentScore > maxScore) {
        maxScore = currentScore;
        maxScoreEl.textContent = maxScore;
        localStorage.setItem('minigame_max_score', maxScore);
      }
    }

    startGame();
  </script>
</body>
</html>
